<div class="gm-controls" role="navigation" aria-label="Site controls">

  <!-- PDF -->
  <a
    class="gm-icon-btn gm-pdf-btn"
    href="Math-Camp.pdf"
    target="_blank"
    rel="noopener"
    aria-label="View PDF"
    title="View PDF"
  >
    <svg class="gm-icon" viewBox="0 0 24 24" fill="none">
      <path d="M7 3.5h7l3 3V20a1.5 1.5 0 0 1-1.5 1.5H7A1.5 1.5 0 0 1 5.5 20V5A1.5 1.5 0 0 1 7 3.5Z"
      stroke="currentColor" stroke-width="1.6"/>
      <path d="M14 3.5V7h3.5"
      stroke="currentColor" stroke-width="1.6"/>
    </svg>
  </a>

  <!-- Theme toggle -->
  <button
    class="gm-icon-btn"
    type="button"
    aria-label="Toggle theme"
    title="Toggle theme"
    onclick="window.__gmToggleTheme && window.__gmToggleTheme()"
  >
    <svg class="gm-icon" viewBox="0 0 24 24" fill="none">
      <path d="M12 3v2.2M12 18.8V21M4.2 12H3M21 12h-1.2"
      stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M12 7.2a4.8 4.8 0 1 0 0 9.6"
      stroke="currentColor" stroke-width="1.6"/>
    </svg>
  </button>

</div>

<script>
(function(){

  function fixPdfPath() {
    const pdf = document.querySelector(".gm-pdf-btn");
    if (!pdf) return;

    const inChapters = window.location.pathname.includes("/chapters/");
    pdf.setAttribute(
      "href",
      inChapters ? "../Math-Camp.pdf" : "Math-Camp.pdf"
    );
  }

  function mountControls() {
    const controls = document.querySelector(".gm-controls");
    if (!controls) return false;

    const sidebar = document.getElementById("quarto-sidebar");
    if (!sidebar) return false;

    if (controls.dataset.mounted === "true") return true;

    const anchor =
      sidebar.querySelector(".sidebar-title") ||
      sidebar.querySelector(".sidebar-header") ||
      sidebar.querySelector("#quarto-search");

    if (!anchor) return false;

    anchor.insertAdjacentElement("afterend", controls);
    controls.dataset.mounted = "true";
    return true;
  }

  function init() {

    fixPdfPath();

    if (mountControls()) return;

    const obs = new MutationObserver(()=>{
      if (mountControls()) obs.disconnect();
    });

    obs.observe(document.documentElement,{childList:true,subtree:true});
    setTimeout(()=>obs.disconnect(),5000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded",init,{once:true});
  } else {
    init();
  }

})();
</script>
